# ==============================================================
# PRERENDER.IO NGINX CONFIG FOR tryvariational.xyz
# ==============================================================
#
# HOW TO SET UP:
#
# 1. Sign up at https://prerender.io (free tier = 250 pages/month)
# 2. Get your Prerender.io token from the dashboard
# 3. Replace YOUR_PRERENDER_TOKEN below with your actual token
# 4. SSH into your VPS: ssh root@135.181.248.183
# 5. Edit the Nginx config: nano /etc/nginx/sites-available/default
# 6. Add the map{} block OUTSIDE the server{} block (near the top)
# 7. Add the prerender location block INSIDE the server{} block
# 8. Test: nginx -t
# 9. Reload: systemctl reload nginx
# 10. Verify: curl -A "Googlebot" https://tryvariational.xyz/rates
#     → Should return fully rendered HTML (not empty <div id="root">)
#
# ==============================================================

# ---- STEP 1: Add this OUTSIDE the server {} block ----

map $http_user_agent $prerender_ua {
    default       0;
    "~*googlebot"                1;
    "~*bingbot"                  1;
    "~*yandex"                   1;
    "~*baiduspider"              1;
    "~*facebookexternalhit"      1;
    "~*twitterbot"               1;
    "~*rogerbot"                 1;
    "~*linkedinbot"              1;
    "~*embedly"                  1;
    "~*quora link preview"       1;
    "~*showyoubot"               1;
    "~*outbrain"                 1;
    "~*pinterest\/0\."           1;
    "~*developers.google.com"    1;
    "~*slackbot"                 1;
    "~*vkShare"                  1;
    "~*W3C_Validator"            1;
    "~*whatsapp"                 1;
    "~*Applebot"                 1;
    "~*Discordbot"               1;
    "~*TelegramBot"              1;
}

map $args $prerender_args {
    default $prerender_ua;
    "~(^|&)_escaped_fragment_=" 1;
}

map $http_x_prerender $x_prerender {
    default $prerender_args;
    "1"     0;
}

map $uri $prerender {
    default $x_prerender;
    "~*\.(js|css|xml|less|png|jpg|jpeg|gif|pdf|doc|txt|ico|rss|zip|mp3|rar|exe|wmv|doc|avi|ppt|mpg|mpeg|tif|wav|mov|psd|ai|xls|mp4|m4a|swf|dat|dmg|iso|flv|m4v|torrent|ttf|woff|woff2|svg|eot)" 0;
}


# ---- STEP 2: Add this INSIDE the server {} block, BEFORE the existing location / {} ----

location / {
    # If it's a bot, proxy to prerender.io
    if ($prerender = 1) {
        rewrite (.*) /prerenderio last;
    }

    # Normal users get the SPA
    root /opt/variational-landing/dist;
    try_files $uri $uri/ /index.html;
}

location /prerenderio {
    if ($prerender = 0) {
        return 404;
    }

    proxy_set_header X-Prerender-Token YOUR_PRERENDER_TOKEN;
    proxy_set_header X-Prerender-Int-Type "headless-chrome";

    proxy_hide_header Cache-Control;
    add_header Cache-Control "private, max-age=600, must-revalidate";

    # Resolve prerender.io at runtime
    resolver 8.8.8.8;
    set $prerender_host "service.prerender.io";

    # Rewrite to the original URL
    rewrite .* /$scheme://$host$request_uri? break;
    proxy_pass https://$prerender_host;
}


# ==============================================================
# ALTERNATIVE: FREE SELF-HOSTED PRERENDER (no prerender.io account needed)
# ==============================================================
#
# If you don't want to use prerender.io, you can run your own
# prerender server on the VPS using the open-source prerender package:
#
#   npm install -g prerender
#   pm2 start prerender --name prerender-server
#
# Then replace the proxy_pass line above with:
#   proxy_pass http://127.0.0.1:3000;
#
# The open-source prerender server uses Chromium headless to render
# your pages on demand. It's free but uses more VPS resources.
#
# ==============================================================


