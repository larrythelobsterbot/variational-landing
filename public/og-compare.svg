<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid2)"/>
  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="#FFB800"/>
  <!-- Bar chart visualization -->
  <rect x="120" y="280" width="80" height="200" rx="2" fill="#FFB800" opacity="0.9"/>
  <rect x="230" y="320" width="80" height="160" rx="2" fill="#FFB80066"/>
  <rect x="340" y="350" width="80" height="130" rx="2" fill="#FFB80044"/>
  <rect x="450" y="370" width="80" height="110" rx="2" fill="#FFB80033"/>
  <rect x="560" y="390" width="80" height="90" rx="2"  fill="#FFB80022"/>
  <rect x="670" y="400" width="80" height="80" rx="2"  fill="#FFB80018"/>
  <rect x="780" y="410" width="80" height="70" rx="2"  fill="#FFB80012"/>
  <rect x="890" y="420" width="80" height="60" rx="2"  fill="#FFB8000d"/>
  <!-- Bar labels -->
  <text x="160" y="500" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">VAR</text>
  <text x="270" y="500" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">HYPE</text>
  <text x="380" y="500" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">DYDX</text>
  <text x="490" y="500" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">GMX</text>
  <text x="600" y="500" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">DRFT</text>
  <text x="710" y="500" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">JUP</text>
  <text x="820" y="500" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">LGHTR</text>
  <text x="930" y="500" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">PRDX</text>
  <!-- Baseline -->
  <line x1="100" y1="480" x2="990" y2="480" stroke="#ffffff18" stroke-width="1"/>
  <!-- Label: tool badge -->
  <rect x="80" y="50" rx="4" ry="4" width="200" height="28" fill="#FFB80018" stroke="#FFB80044" stroke-width="1"/>
  <text x="180" y="70" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#FFB800" letter-spacing="0.08em">PERP DEX COMPARE</text>
  <!-- Title -->
  <text x="80" y="130" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="#e8e0d0">Compare Top Perp DEX</text>
  <text x="80" y="185" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="#e8e0d0">Protocols Side by Side</text>
  <!-- Subtitle -->
  <text x="80" y="230" font-family="system-ui, sans-serif" font-size="20" fill="#888">Live data from DefiLlama. Volume, fees, OI, markets, and more.</text>
  <!-- LIVE badge -->
  <circle cx="1050" y="65" r="5" fill="#22c55e"/>
  <text x="1065" y="70" font-family="monospace" font-size="13" font-weight="600" fill="#e8e0d0" letter-spacing="0.06em">LIVE</text>
  <!-- Domain -->
  <text x="1120" y="580" text-anchor="end" font-family="monospace" font-size="14" fill="#88888866">tryvariational.xyz/compare</text>
</svg>
