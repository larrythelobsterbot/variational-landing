<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#000000"/>
  <!-- Scanline effect -->
  <defs>
    <pattern id="scan" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect width="1200" height="2" fill="#00FF4104"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#scan)"/>
  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="#00FF41"/>
  <!-- Heatmap grid visualization -->
  <g transform="translate(80, 280)">
    <!-- Row 1 -->
    <rect x="0"   y="0" width="90" height="40" rx="3" fill="#ef444499"/>
    <rect x="100" y="0" width="90" height="40" rx="3" fill="#ef444477"/>
    <rect x="200" y="0" width="90" height="40" rx="3" fill="#ef444455"/>
    <rect x="300" y="0" width="90" height="40" rx="3" fill="#fbbf2455"/>
    <rect x="400" y="0" width="90" height="40" rx="3" fill="#22c55e33"/>
    <rect x="500" y="0" width="90" height="40" rx="3" fill="#22c55e22"/>
    <rect x="600" y="0" width="90" height="40" rx="3" fill="#22c55e33"/>
    <rect x="700" y="0" width="90" height="40" rx="3" fill="#fbbf2444"/>
    <rect x="800" y="0" width="90" height="40" rx="3" fill="#ef444466"/>
    <rect x="900" y="0" width="90" height="40" rx="3" fill="#ef444488"/>
    <!-- Row 2 -->
    <rect x="0"   y="50" width="90" height="40" rx="3" fill="#ef444466"/>
    <rect x="100" y="50" width="90" height="40" rx="3" fill="#ef444444"/>
    <rect x="200" y="50" width="90" height="40" rx="3" fill="#fbbf2433"/>
    <rect x="300" y="50" width="90" height="40" rx="3" fill="#22c55e22"/>
    <rect x="400" y="50" width="90" height="40" rx="3" fill="#22c55e44"/>
    <rect x="500" y="50" width="90" height="40" rx="3" fill="#22c55e55"/>
    <rect x="600" y="50" width="90" height="40" rx="3" fill="#22c55e44"/>
    <rect x="700" y="50" width="90" height="40" rx="3" fill="#22c55e22"/>
    <rect x="800" y="50" width="90" height="40" rx="3" fill="#fbbf2433"/>
    <rect x="900" y="50" width="90" height="40" rx="3" fill="#ef444455"/>
    <!-- Row 3 -->
    <rect x="0"   y="100" width="90" height="40" rx="3" fill="#ef444488"/>
    <rect x="100" y="100" width="90" height="40" rx="3" fill="#ef444466"/>
    <rect x="200" y="100" width="90" height="40" rx="3" fill="#ef444444"/>
    <rect x="300" y="100" width="90" height="40" rx="3" fill="#fbbf2444"/>
    <rect x="400" y="100" width="90" height="40" rx="3" fill="#fbbf2433"/>
    <rect x="500" y="100" width="90" height="40" rx="3" fill="#22c55e33"/>
    <rect x="600" y="100" width="90" height="40" rx="3" fill="#fbbf2444"/>
    <rect x="700" y="100" width="90" height="40" rx="3" fill="#ef444444"/>
    <rect x="800" y="100" width="90" height="40" rx="3" fill="#ef444477"/>
    <rect x="900" y="100" width="90" height="40" rx="3" fill="#ef444499"/>
    <!-- Axis labels -->
    <text x="45"  y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#00FF4166">BTC</text>
    <text x="145" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#00FF4166">ETH</text>
    <text x="245" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#00FF4166">SOL</text>
    <text x="345" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#00FF4166">DOGE</text>
    <text x="445" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#00FF4166">ARB</text>
    <text x="545" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#00FF4166">LINK</text>
    <text x="645" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#00FF4166">AVAX</text>
    <text x="745" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#00FF4166">OP</text>
    <text x="845" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#00FF4166">SUI</text>
    <text x="945" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#00FF4166">WIF</text>
    <!-- Y-axis labels -->
    <text x="-15" y="25" text-anchor="end" font-family="monospace" font-size="11" fill="#00FF4166">25x</text>
    <text x="-15" y="75" text-anchor="end" font-family="monospace" font-size="11" fill="#00FF4166">50x</text>
    <text x="-15" y="125" text-anchor="end" font-family="monospace" font-size="11" fill="#00FF4166">100x</text>
  </g>
  <!-- Label: tool badge -->
  <rect x="80" y="50" rx="4" ry="4" width="200" height="28" fill="#00FF4118" stroke="#00FF4144" stroke-width="1"/>
  <text x="180" y="70" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#00FF41" letter-spacing="0.08em">LIQUIDATION TRACKER</text>
  <!-- Title -->
  <text x="80" y="130" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="#e0e0e0">Live Crypto Liquidations</text>
  <text x="80" y="185" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="#e0e0e0">Heatmap &amp; Monitor</text>
  <!-- Subtitle -->
  <text x="80" y="230" font-family="system-ui, sans-serif" font-size="20" fill="#00FF4188">Track real-time liquidation events across major perpetual exchanges.</text>
  <!-- Legend -->
  <rect x="80" y="555" width="14" height="14" rx="2" fill="#ef444488"/>
  <text x="102" y="567" font-family="monospace" font-size="12" fill="#00FF4166">High liq. density</text>
  <rect x="260" y="555" width="14" height="14" rx="2" fill="#fbbf2444"/>
  <text x="282" y="567" font-family="monospace" font-size="12" fill="#00FF4166">Medium</text>
  <rect x="380" y="555" width="14" height="14" rx="2" fill="#22c55e44"/>
  <text x="402" y="567" font-family="monospace" font-size="12" fill="#00FF4166">Low</text>
  <!-- Domain -->
  <text x="1120" y="580" text-anchor="end" font-family="monospace" font-size="14" fill="#00FF4144">tryvariational.xyz/liquidations</text>
</svg>
